[llm]
	type = "ollama"
	model = "llama3.2"
	base_url = "http://localhost:11434"
	timeout_seconds = 60


[messaging]
	type = "log"


[storage]
	type = "json"
	path = "data/conversations"


[message_classifier]
	type = "heuristic"


[structured_extraction]
	type = "heuristic"


[reply_generation]
	type = "shared_llm"
	shared = "llm"


[tracking]
	type = "off"
