[llm]
	type = "pydantic_ai"
	model = "claude-sonnet-4-6"
	api_key_env = "ANTHROPIC_API_KEY"


[messaging]
	type = "log"


[storage]
	type = "json"
	path = "data/conversations"


[message_classifier]
	type = "llm"
	model = "claude-sonnet-4-6"
	api_key_env = "ANTHROPIC_API_KEY"


[structured_extraction]
	type = "llm"
	model = "claude-sonnet-4-6"
	api_key_env = "ANTHROPIC_API_KEY"


[reply_generation]
	type = "shared_llm"
	shared = "llm"


[tracking]
	type = "off"
